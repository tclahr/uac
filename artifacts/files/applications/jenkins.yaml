version: 1.0
artifacts:
  -
    description: Collect Jenkins {build,config}.xml files.
    supported_os: [linux, macos]
    collector: file
    path: /var /opt
    path_pattern: ["*/jenkins/*"]
    name_pattern: ["config.xml","build.xml"]
    file_type: [f]
  -
    description: Collect Jenkins {build,config}.xml files from home directory.
    supported_os: [linux, macos]
    collector: file
    path: /%user_home%/.jenkins
    name_pattern: ["config.xml","build.xml"]
    file_type: [f]
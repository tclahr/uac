version: 1.0
artifacts:
  -
    description: Collect history files (including logrotate and backup files).
    supported_os: [all]
    collector: file
    path: /%user_home%/.local/share/fish/ /%user_home%/.local/share/fish/fish_history.*
  -
    description: Collect user config files.
    supported_os: [all]
    collector: file
    path: /%user_home%/.config/fish/config.fish
  -
    description: Collect system config files.
    supported_os: [all]
    collector: file
    path: /etc/fish/config.fish
  -
    description: Parse config files to determine $HISTFILE.
    supported_os: [all]
    collector: command
    command: grep -E "HISTFILE=.*" /%user_home%/.config/fish/config.fish /etc/fish/config.fish | sed -e 's|.*HISTFILE=||' -e 's|^~/|/%user_home%/|'
    output_directory: /%temp_directory%/files/shell
    output_file: fish_histfile.txt
  -
    description: Collect $HISTFILE.
    supported_os: [all]
    collector: file
    path: /%temp_directory%/files/shell/fish_histfile.txt
    is_file_list: true
  
version: 1.0
artifacts:
  -
    description: Collect history files (including logrotate and backup files).
    supported_os: [all]
    collector: file
    path: /%user_home%/.zsh_history /%user_home%/.zhistory /%user_home%/.zsh_history~ /%user_home%/.zsh_history.* /%user_home%/.zhistory~ /%user_home%/.zhistory.*
  -
    description: Collect user config files.
    supported_os: [all]
    collector: file
    path: /%user_home%/.zlogin /%user_home%/.zprofile /%user_home%/.zshenv /%user_home%/.zshrc
  -
    description: Collect user session files.
    supported_os: [all]
    collector: file
    path: /%user_home%/.zsh_sessions
  -
    description: Collect system config files.
    supported_os: [all]
    collector: file
    path: /etc/zshenv /etc/zprofile /etc/zshrc /etc/zlogin
  -
    description: Parse config files to determine $HISTFILE.
    supported_os: [all]
    collector: command
    command: grep -E "^HISTFILE=.*" /%user_home%/.zlogin /%user_home%/.zprofile /%user_home%/.zshenv /%user_home%/.zshrc /etc/zshenv /etc/zprofile /etc/zshrc /etc/zlogin | sed -e 's|.*HISTFILE=||' -e 's|^~/|/%user_home%/|'
    output_directory: /%temp_directory%/files/shell
    output_file: zsh_histfile.txt
  -
    description: Collect $HISTFILE.
    supported_os: [all]
    collector: file
    path: /%temp_directory%/files/shell/zsh_histfile.txt
    is_file_list: true

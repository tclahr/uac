version: 2.1
condition: if [ "%mount_point%" == "/" ]; then true; else false; fi
output_directory: /live_response/system
artifacts:
  -
    description: List all socket files.
    supported_os: [all]
    collector: find
    path: /
    file_type: [s]
    exclude_file_system: [proc, procfs]
    output_file: socket_files.txt
  
version: 2.2
condition: if [ ! -f "/%artifacts_output_directory%/system/suid.txt" ]; then true; else false; fi
output_directory: /system
artifacts:
  -
    description: Search for files that have SUID bit set.
    supported_os: [all]
    collector: find
    path: /
    exclude_file_system: [proc, procfs]
    file_type: [f]
    permissions: [-4000]
    output_file: suid.txt
  
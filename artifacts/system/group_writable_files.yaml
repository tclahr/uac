version: 1.1
condition: if [ ! -f "/%artifacts_output_directory%/system/group_writable_files.txt" ]; then true; else false; fi
output_directory: /system
artifacts:
  -
    description: List all group writable files.
    supported_os: [all]
    collector: find
    path: /
    file_type: [f]
    permissions: [-0040]
    exclude_file_system: [proc, procfs]
    output_file: group_writable_files.txt
  
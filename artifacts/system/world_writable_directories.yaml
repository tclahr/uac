version: 2.3
condition: if [ ! -f "/%artifacts_output_directory%/system/world_writable_directories.txt" ]; then true; else false; fi
output_directory: /system
artifacts:
  -
    description: List all world writable directories.
    supported_os: [all]
    collector: find
    path: /
    file_type: [d]
    permissions: [-0004]
    exclude_file_system: [proc, procfs]
    output_file: world_writable_directories.txt
  